<!DOCTYPE html>
{% load static %}

<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel da Cozinha</title>
  <style>:root{
  --bg:#0b1612;
  --card:#0f221a;
  --card2:#12271e;
  --line:rgba(243,231,199,.14);
  --muted:#d9cfb6;
  --text:#ffffff;
  --cream:#f3e7c7;
  --gold:#c9a24a;
  --accent:#c21f2c;   /* vermelho */
  --green:#1b7a3a;    /* verde */
  --btn:#1a2d23;
  --btn2:#223b2d;
  --danger:#b51d2c;
}

    body { font-family: Arial, sans-serif; background:var(--bg); color:#fff; margin:0; }
    header { position: sticky; top:0; background:var(--bg); border-bottom:1px solid #222; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    h1 { font-size:18px; margin:0; }
    .meta { font-size:12px; color:#bbb; }
    .wrap { padding:16px; max-width:1200px; margin:0 auto; }
    .controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    button { background:#1f1f1f; color:#fff; border:1px solid var(--line); border-radius:10px; padding:8px 10px; cursor:pointer; }
    button:hover { border-color:#555; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:14px; }
    .card { border:1px solid #222; border-radius:14px; padding:14px; background:#101010; }
    .top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
    .id { font-size:14px; font-weight:700; }
    .badge { font-size:12px; padding:4px 10px; border-radius:999px; border:1px solid var(--line); color:#eee; }
    .badge.NOVO { border-color:#0f4; color:#9f9; }
    .badge.PREPARANDO { border-color:#ff0; color:#ff9; }
    .badge.SAIU { border-color:#0af; color:#9df; }
    .badge.FINALIZADO { border-color:#666; color:#aaa; }
    .badge.CANCELADO { border-color:#a00; color:#f99; }
    .line { color:#bbb; font-size:12px; margin-top:6px; }
    .items { margin-top:10px; border-top:1px dashed #2a2a2a; padding-top:10px; }
    .item { display:flex; justify-content:space-between; gap:10px; font-size:13px; padding:4px 0; }
    .empty { color:#aaa; text-align:center; padding:50px 10px; border:1px dashed #333; border-radius:14px; }
    .hint { font-size:12px; color:#aaa; margin-top:8px; }
  
/* ===== FUNDO PREMIUM COM LOGO (MARCA D'ÁGUA) ===== */
html{ background: var(--bg); }
body{ position:relative; min-height:100vh; background: var(--bg) !important; }
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: url("{% static 'catalog/images/logo.jpg' %}") center center / 420px no-repeat;
  opacity:.07;
  filter: saturate(1.05) contrast(1.05);
  pointer-events:none;
  z-index:-2;
  animation: watermarkPulse 8s ease-in-out infinite;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 28%, rgba(201,162,74,.10), transparent 55%),
    radial-gradient(circle at 50% 72%, rgba(194,31,44,.08), transparent 55%),
    rgba(5,12,8,0.90);
  pointer-events:none;
  z-index:-1;
}
@keyframes watermarkPulse{
  0%,100%{ transform:scale(1); opacity:.06; }
  50%{ transform:scale(1.03); opacity:.085; }
}
@media (max-width: 768px){
  body::before{ background-size: 260px; }
}



/* ===== MOBILE APP FEEL (evita "dançar" no iOS e melhora centralização) ===== */
html, body{ overflow-x:hidden; }
body{ min-height:100vh; }
@supports (height: 100dvh){ body{ min-height:100dvh; } }

/* iOS Safari não lida bem com background FIXO + animação; isso causa "pulos" ao rolar */
@media (max-width: 1024px){
  body::before, body::after{ position:absolute; }
  body::before{ animation:none !important; }
}

</style>
</head>
<body>
  <header>
    <div>
      <h1>Painel da Cozinha</h1>
      <div class="meta" id="meta">Atualizando…</div>
    </div>
    <div class="controls">
      <form action="{% url 'toggle_store_open' %}" method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit" title="Abrir/Fechar cardápio">
          {% if store_open %}🔴 Fechar pizzaria{% else %}🟢 Abrir pizzaria{% endif %}
        </button>
      </form>

      <button id="toggleSound">🔔 Som: ligado</button>
      <button id="refreshNow">↻ Atualizar agora</button>
      <a href="/painel/" style="color:#bbb; font-size:12px; text-decoration:none;">Abrir painel completo</a>
    </div>
  </header>

  <div class="wrap">
    <div id="container" class="grid"></div>
    <div class="hint">Dica: deixe esta tela aberta em um monitor na cozinha. Ela atualiza sozinha e toca um alerta quando chega pedido novo.</div>
  </div>

<script>
  const API_URL = "/api/cozinha/";
  const POLL_MS = 3000;


  // Toca campainha real por até 4 segundos
  const ALERT_SOUND_URL = "{% static 'sounds/campainha.mp3' %}";
  let activeAudio = null;

  function stopAlertSound() {
    if (!activeAudio) return;
    try {
      activeAudio.pause();
      activeAudio.currentTime = 0;
    } catch (e) {
      console.log("audio stop error", e);
    }
    activeAudio = null;
  }

  function beep() {
    try {
      stopAlertSound();
      const audio = new Audio(ALERT_SOUND_URL);
      audio.preload = "auto";
      audio.loop = true;
      activeAudio = audio;

      const playPromise = audio.play();
      if (playPromise && typeof playPromise.then === "function") {
        playPromise.catch((e) => console.log("audio play error", e));
      }

      setTimeout(() => {
        if (activeAudio === audio) stopAlertSound();
      }, 4000);
    } catch (e) {
      console.log("beep error", e);
    }
  }


  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString("pt-BR");
    } catch { return iso; }
  }

  const state = {
    sound: (localStorage.getItem("kitchen_sound") ?? "on") === "on",
    lastMaxId: parseInt(localStorage.getItem("kitchen_last_max_id") ?? "0", 10) || 0,
    timer: null
  };

  const metaEl = document.getElementById("meta");
  const container = document.getElementById("container");
  const toggleSoundBtn = document.getElementById("toggleSound");
  const refreshNowBtn = document.getElementById("refreshNow");

  function updateSoundButton() {
    toggleSoundBtn.textContent = state.sound ? "🔔 Som: ligado" : "🔕 Som: desligado";
  }

  toggleSoundBtn.addEventListener("click", () => {
    state.sound = !state.sound;
    localStorage.setItem("kitchen_sound", state.sound ? "on" : "off");
    updateSoundButton();
    if (state.sound) beep();
  });

  refreshNowBtn.addEventListener("click", () => loadOnce(true));

  updateSoundButton();

  function render(orders) {
    container.innerHTML = "";
    if (!orders || orders.length === 0) {
      container.innerHTML = '<div class="empty">Nenhum pedido em aberto no momento.</div>';
      return;
    }

    for (const o of orders) {
      const itemsHtml = (o.items || []).map(it => {
        const size = it.size_label ? ` (${it.size_label})` : "";
        const addons = (it.addons && it.addons.length) ? (`<div class="muted" style="margin-left:10px;margin-top:2px;">` +
          it.addons.map(a => `${a.qty}x ${a.name}`).join(" • ") +
        `</div>`) : "";
        return `<div class="item"><div>${it.quantity}x ${it.product_name}${size}${addons}</div></div>`;
      }).join("");

      const addrLine = (o.delivery_type === "ENTREGA" && o.address) ? `📍 ${o.address}${(o.reference_point && o.reference_point.trim()) ? `\n📌 Ref: ${o.reference_point}` : ""}` : (o.delivery_type === "RETIRADA" ? "🏪 Retirada no balcão" : "");
      const notesLine = (o.notes && o.notes.trim()) ? `📝 ${o.notes}` : "";
      const pixExtra = (o.payment_method === "PIX") ? (` • PIX: ${o.pix_status || 'pending'}${o.paid ? ' ✅' : ''}`) : (o.paid ? ' ✅' : '');
      const payLine = (o.payment_method_label ? `💳 ${o.payment_method_label}` + ((o.payment_method==="DINHEIRO" && o.cash_change_for) ? ` (troco para R$ ${o.cash_change_for})` : "") + pixExtra : "");

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="top">
          <div class="id">Pedido #${o.id}</div>
          <div class="badge ${o.status}">${o.status}</div>
        </div>
        <div class="line">⏱️ ${fmtDate(o.created_at)}</div>
        <div class="line">👤 ${o.customer_name} • 📞 ${o.phone}</div>
        ${payLine ? `<div class="line">${payLine}</div>` : ""}
        ${addrLine ? `<div class="line">${addrLine}</div>` : ""}
        ${notesLine ? `<div class="line">${notesLine}</div>` : ""}
        <div class="items">
          ${itemsHtml}
        </div>
      `;
      container.appendChild(card);
    }
  }

  async function loadOnce(manual=false) {
    try {
      const res = await fetch(API_URL, { cache: "no-store" });
      const payload = await res.json();

      const now = new Date().toLocaleTimeString("pt-BR");
      metaEl.textContent = `Última atualização: ${now} • Pedidos: ${(payload.orders||[]).length}`;

      const maxId = parseInt(payload.max_id || 0, 10) || 0;

      // toca som se chegou pedido novo (id maior do que o último visto)
      if (maxId > state.lastMaxId) {
        if (state.lastMaxId !== 0 && state.sound) {
          beep();
        }
        state.lastMaxId = maxId;
        localStorage.setItem("kitchen_last_max_id", String(state.lastMaxId));
      }

      render(payload.orders || []);
    } catch (e) {
      metaEl.textContent = "Erro ao atualizar (verifique internet/servidor).";
      console.log(e);
      if (manual) alert("Não foi possível atualizar agora. Veja o console do navegador.");
    }
  }

  function start() {
    loadOnce(false);
    state.timer = setInterval(() => loadOnce(false), POLL_MS);
  }

  start();
</script>
</body>
</html>
