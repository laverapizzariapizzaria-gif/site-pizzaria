<!DOCTYPE html>
{% load static %}

<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Link inválido</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; padding:20px; }
    .wrap { max-width: 560px; margin: 0 auto; }
    .card { border:1px solid #333; border-radius:12px; padding:16px; background: rgba(255,255,255,0.02); }
    a { color:#9ad; text-decoration:none; }
    .muted { color:#aaa; font-size:13px; }
  
/* ===== FUNDO PREMIUM COM LOGO (MARCA D'ÁGUA) ===== */
html{ background: var(--bg); }
body{ position:relative; min-height:100vh; background: var(--bg) !important; }
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: url("{% static 'catalog/images/logo.jpg' %}") center center / 420px no-repeat;
  opacity:.07;
  filter: saturate(1.05) contrast(1.05);
  pointer-events:none;
  z-index:-2;
  animation: watermarkPulse 8s ease-in-out infinite;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 28%, rgba(201,162,74,.10), transparent 55%),
    radial-gradient(circle at 50% 72%, rgba(194,31,44,.08), transparent 55%),
    rgba(5,12,8,0.90);
  pointer-events:none;
  z-index:-1;
}
@keyframes watermarkPulse{
  0%,100%{ transform:scale(1); opacity:.06; }
  50%{ transform:scale(1.03); opacity:.085; }
}
@media (max-width: 768px){
  body::before{ background-size: 260px; }
}



/* ===== MOBILE APP FEEL (evita "dançar" no iOS e melhora centralização) ===== */
html, body{ overflow-x:hidden; }
body{ min-height:100vh; }
@supports (height: 100dvh){ body{ min-height:100dvh; } }

/* iOS Safari não lida bem com background FIXO + animação; isso causa "pulos" ao rolar */
@media (max-width: 1024px){
  body::before, body::after{ position:absolute; }
  body::before{ animation:none !important; }
}

</style>
</head>
<body>
  <div class="wrap">
    <h1>⚠️ Link inválido</h1>
    <div class="card">
      <p>Esse link para definir senha expirou ou é inválido.</p>
      <p class="muted">Se você já tem conta, faça login normalmente.</p>
      <p><a href="{{ login_url }}">Entrar</a></p>
      <p class="muted"><a href="/">← Voltar ao cardápio</a></p>
    </div>
  </div>
</body>
</html>
