<!DOCTYPE html>
{% load static %}

<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Entrar</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; padding:20px; }
    .wrap { max-width: 520px; margin: 0 auto; }
    .card { border:1px solid #333; border-radius:12px; padding:16px; background: rgba(255,255,255,0.02); }
    input { width:100%; padding:10px; border-radius:10px; border:1px solid #333; background:#0b0b0b; color:#fff; box-sizing:border-box; }
    label { display:block; margin-top:10px; margin-bottom:6px; color:#ddd; }
    .btn { width:100%; margin-top:14px; padding:12px 14px; border-radius:12px; border:1px solid #555; background:#facc15; color:#111; font-weight:bold; cursor:pointer; }
    a { color:#9ad; text-decoration:none; }
    .muted { color:#aaa; font-size:13px; }
    .err { color:#ffb3b3; margin-top:10px; }
  
/* ===== FUNDO PREMIUM COM LOGO (MARCA D'ÁGUA) ===== */
html{ background: var(--bg); }
body{ position:relative; min-height:100vh; background: var(--bg) !important; }
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: url("{% static 'catalog/images/logo.jpg' %}") center center / 420px no-repeat;
  opacity:.07;
  filter: saturate(1.05) contrast(1.05);
  pointer-events:none;
  z-index:-2;
  animation: watermarkPulse 8s ease-in-out infinite;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 28%, rgba(201,162,74,.10), transparent 55%),
    radial-gradient(circle at 50% 72%, rgba(194,31,44,.08), transparent 55%),
    rgba(5,12,8,0.90);
  pointer-events:none;
  z-index:-1;
}
@keyframes watermarkPulse{
  0%,100%{ transform:scale(1); opacity:.06; }
  50%{ transform:scale(1.03); opacity:.085; }
}
@media (max-width: 768px){
  body::before{ background-size: 260px; }
}



/* ===== MOBILE APP FEEL (evita "dançar" no iOS e melhora centralização) ===== */
html, body{ overflow-x:hidden; }
body{ min-height:100vh; }
@supports (height: 100dvh){ body{ min-height:100dvh; } }

/* iOS Safari não lida bem com background FIXO + animação; isso causa "pulos" ao rolar */
@media (max-width: 1024px){
  body::before, body::after{ position:absolute; }
  body::before{ animation:none !important; }
}

</style>
</head>
<body>
  <div class="wrap">
    <h1>👤 Entrar</h1>
    <p class="muted"><a href="/">← Voltar ao cardápio</a></p>
    <div class="card">
      <form method="post">
        {% csrf_token %}
        {% if form.non_field_errors %}
          <div class="err">{{ form.non_field_errors }}</div>
        {% endif %}
        <label>Usuário (email)</label>
        {{ form.username }}
        <label>Senha</label>
        {{ form.password }}
        <button class="btn" type="submit">Entrar</button>
      </form>
      <p class="muted" style="margin-top:12px;">Não tem conta? <a href="/conta/cadastrar/">Cadastrar</a></p>
    </div>
  </div>
</body>
</html>
