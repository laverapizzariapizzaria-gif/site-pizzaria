{% load static %}
{% extends "base.html" %}
{% block content %}
<div class="container">
  <h1>Escolher sabores</h1>
  <p><strong>{{ product.name }}</strong> {% if size_code %}- tamanho {{ size_code }}{% endif %}</p>
  <p>Selecione até <strong>{{ max_flavors }}</strong> sabor(es).</p>

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="size_code" value="{{ size_code }}">
    <div class="grid">
      {% for p in flavors %}
        <label class="card">
          <input type="checkbox" name="flavors" value="{{ p.id }}" class="flv">
          <div class="name">{{ p.name }}</div>
          <div class="price">
            {% if p.promo_price %}<span class="old">R$ {{ p.price }}</span> <span class="promo">R$ {{ p.promo_price }}</span>{% else %}R$ {{ p.price }}{% endif %}
          </div>
        </label>
      {% endfor %}
    </div>

    <div style="margin-top:14px;">
      <button class="btn-primary" type="submit">Adicionar ao carrinho</button>
      <a class="btn-secondary" href="{% url 'catalog:menu' %}">Voltar</a>
    </div>
  </form>
</div>

<script>
(function(){
  const max = {{ max_flavors|default:1 }};
  const boxes = Array.from(document.querySelectorAll('.flv'));
  function enforce(){
    const checked = boxes.filter(b => b.checked);
    if(checked.length > max){
      // desmarca o último
      checked[checked.length-1].checked = false;
      alert('Você pode escolher até ' + max + ' sabor(es).');
    }
  }
  boxes.forEach(b => b.addEventListener('change', enforce));
})();
</script>

<style>:root{
  --bg:#0b1612;
  --card:#0f221a;
  --card2:#12271e;
  --line:rgba(243,231,199,.14);
  --muted:#d9cfb6;
  --text:#ffffff;
  --cream:#f3e7c7;
  --gold:#c9a24a;
  --accent:#c21f2c;   /* vermelho */
  --green:#1b7a3a;    /* verde */
  --btn:#1a2d23;
  --btn2:#223b2d;
  --danger:#b51d2c;
}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:10px;}
.card{display:block;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);cursor:pointer;}
.card input{margin-right:8px;}
.name{font-weight:700;margin:6px 0;}
.old{text-decoration:line-through;opacity:.7;margin-right:8px;}
.promo{font-weight:800;}

/* ===== FUNDO PREMIUM COM LOGO (MARCA D'ÁGUA) ===== */
html{ background: var(--bg); }
body{ position:relative; min-height:100vh; background: var(--bg) !important; }
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: url("{% static 'catalog/images/logo.jpg' %}") center center / 420px no-repeat;
  opacity:.07;
  filter: saturate(1.05) contrast(1.05);
  pointer-events:none;
  z-index:-2;
  animation: watermarkPulse 8s ease-in-out infinite;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 28%, rgba(201,162,74,.10), transparent 55%),
    radial-gradient(circle at 50% 72%, rgba(194,31,44,.08), transparent 55%),
    rgba(5,12,8,0.90);
  pointer-events:none;
  z-index:-1;
}
@keyframes watermarkPulse{
  0%,100%{ transform:scale(1); opacity:.06; }
  50%{ transform:scale(1.03); opacity:.085; }
}
@media (max-width: 768px){
  body::before{ background-size: 260px; }
}



/* ===== MOBILE APP FEEL (evita "dançar" no iOS e melhora centralização) ===== */
html, body{ overflow-x:hidden; }
body{ min-height:100vh; }
@supports (height: 100dvh){ body{ min-height:100dvh; } }

/* iOS Safari não lida bem com background FIXO + animação; isso causa "pulos" ao rolar */
@media (max-width: 1024px){
  body::before, body::after{ position:absolute; }
  body::before{ animation:none !important; }
}

</style>
{% endblock %}
